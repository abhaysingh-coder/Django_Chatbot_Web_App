<div class="container-fluid p-0 py-3">
        <!-- Profile Header -->
        <div class="text-center text-white p-4" style="background: linear-gradient(135deg, #5b5df5, #25b7f5);">
            {% load static %}
            <img src="{% static 'icon.png' %}" class="rounded-circle border border-3 border-white" width="120" height="120">
            <h2 class="mt-3 mb-1">{{ user.Name }}</h2>
            <h5>{{ user.email }}</h5>
        </div>
        <!-- Profile Details -->
        <div class="container mt-4">
            <div class="card shadow-sm mb-3">
                <div class="card-body d-flex">
                    <i class="fa-solid fa-user fs-3 me-4"></i>
                        <div class="d-flex align-items-center gap-2">
                            <h4 class="mb-0">Username:</h4>
                            <p class="fs-5 mb-0 ps-3">{{ user.username }}</p>
                        </div>
                </div>
            </div>
            <div class="card shadow-sm mb-3">
                <div class="card-body d-flex">
                    <i class="fa-solid fa-user fs-3 me-4"></i>
                    <div class="d-flex align-items-center gap-2">
                        <h4 class="mb-0">Name:</h4>
                        <p class="fs-5 mb-0 ps-3">{{ user.Name }}</p>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm mb-3">
                <div class="card-body d-flex">
                    <i class="fa-regular fa-envelope fs-3 me-4"></i>
                    <div class="d-flex align-items-center gap-2">
                        <h4 class="mb-0">Email:</h4>
                        <p class="fs-5 mb-0 ps-3">{{ user.email }}</p>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm mb-3">
                <div class="card-body d-flex">
                    <i class="fa-solid fa-phone fs-3 me-4"></i>
                    <div class="d-flex align-items-center gap-2">
                        <h4 class="mb-0">Phone:</h4>
                        <p class="fs-5 mb-0 ps-3">{{ user.phone_number }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
