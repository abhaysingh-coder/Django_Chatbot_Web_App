    <div class="card mt-4 border-1 p-3 p-md-4 table-responsive" style="max-height: 70vh; overflow-y: auto; scrollbar-width: none;">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">S.No.</th>
                    <th scope="col">Username</th>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Phone</th>
                    <th scope="col">Password</th>
                    <th scope="col">Remove</th>
                </tr>
            </thead>
            <tbody>
                {% for cust in customer %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ cust.username }}</td>
                    <td>{{ cust.Name }}</td>
                    <td>{{ cust.email }}</td>
                    <td>{{ cust.phone_number }}</td>
                    <td>{{ cust.password }}</td>
                    <td>
                        <a href="{% url 'User:delete_data' cust.username role %}" class="btn btn-danger btn-sm">Remove</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
