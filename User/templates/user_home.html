{% extends 'user_base.html' %}
{% load static %}
{% block user %}
    <div class="container mt-4">
        <div class="card border-1 p-4">
            <h2 class="mb-3">Hello {{ user.Name }}</h2>
            <p class="fs-5 text-muted">
                Welcome to your User dashboard.
            </p>
        </div>
        <div class="row mt-4">
            <div class="col-md-6 mb-1">
                <a href="{% url 'User:customer_management' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-user-astronaut fs-1 mb-3"></i>
                        <h4>Customer Management</h4>
                    </div>
                </a>
            </div>
            <div class="col-md-6 mb-1">
                <a href="{% url 'User:messages' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-regular fa-comments fs-1 mb-3"></i>
                        <h4>Messages</h4>
                    </div>
                </a>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-6 mb-1">
                <a href="{% url 'User:request_by_chatbot' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-code-pull-request fs-1 mb-3"></i>
                        <h4>Request by Chatbot</h4>
                    </div>
                </a>
            </div>
            <div class="col-md-6 mb-1">
                <a href="{% url 'User:userbot' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-robot fs-1 mb-3"></i>
                        <h4>Chatbot</h4>
                    </div>
                </a>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-6 mx-auto mb-1">
                <a href="{% url 'User:user_profile' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-address-card fs-1 mb-3"></i>
                        <h4>Profile</h4>
                    </div>
                </a>
            </div>
        </div>
        
    </div>
{% endblock %}
