{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chatbot | Customer Support</title>

    <!-- Favicon -->
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{% static 'CSS/style.css' %}">

    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container-fluid" style="padding-left: 10px; padding-right: 15px;">
        <div class="row">
            <div class="col-sm-12 p-0">
                <nav class="navbar bg-1 p-0">
                    <div class="container-fluid row p-0">
                        <div class="col-sm-0_5">
                            <button class="btn text-white">
                                <i class="fa-solid fa-bars px-1 fs-3 py-2" onclick="hid()"></i>
                            </button>
                        </div>
                        <div class="col-sm-11_5">
                            <div class="row">
                                <div class="col-sm-8 p-0">
                                    <h3 class="mx-5 my-2 text-start">Welcome to Customer Dashboard</h3>
                                </div>
                                <div class="col-sm-3 p-0">
                                    <div class="d-flex align-items-center gap-3">
                                        {% if request.session.customer_email %}
                                            <p class="mt-3 ms-5 ps-5 text-white">{{ request.session.customer_email }}</p>
                                        {% endif %}
                                    </div>
                                </div>
                                <div class="col-sm-1 p-0 py-2">
                                    <a href="{% url 'Admin:logout' %}" class="btn btn-outline-light">Logout</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
        <div class="row">
          <div class="col-sm-2 bg-1 py-1" id="add">
                <div class="row mt-4">
                    <div class="col-sm-12">
                        <ul class="list-unstyled">
                            <li class="btn bg-2 w-100 text-center">
                                <a href="{% url 'Customer:customerhome' %}" class="text-white text-decoration-none">
                                    <div class="row">
                                        <div class="col-sm-1"><i class="fa-solid fa-chart-column"></i></div>
                                        <div class="col-sm-10 text-start r">Dashboard</div>
                                   </div>
                                </a>
                            </li>
                            <li class="btn bg-2 w-100 text-center">
                                <a href="{% url 'Customer:customerprofile' %}" class="text-white text-decoration-none">
                                    <div class="row">
                                        <div class="col-sm-1"><i class="fa-solid fa-address-card"></i></div>
                                        <div class="col-sm-10 text-start r">Profile</div>
                                    </div>
                                </a>
                            </li>
                            <li class="btn bg-2 w-100 text-center">
                                <a href="{% url 'Customer:customerbot' %}" class="text-white text-decoration-none">
                                    <div class="row">
                                        <div class="col-sm-1"><i class="fa-brands fa-bots"></i></div>
                                        <div class="col-sm-10 text-start r">Chatbot</div>
                                    </div>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="col-sm-10" id="remove">
                <div class="row">
                    <div class="col-sm-12 scroll-1">
                        {% block customer %}
                        {% endblock %}
                    </div>
                </div>
                <div class="row p-0">
                    <div class="col-sm-12 p-0">
                        <footer class="footer p-0">
                            <div class="container-fluid p-0">
                                <p class="mb-0 text-muted text-end pe-4">
                                    <strong>&copy; Designed and Developed by Abhay Singh</strong>
                                </p>
                            </div>
                        </footer>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'JS/Script.js' %}"></script>
</body>
</html>
