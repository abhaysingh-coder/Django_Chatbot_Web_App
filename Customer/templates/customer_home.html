{% extends 'customer_base.html' %}
{% load static %}
{% block customer %}
    <div class="container mt-4">
        <div class="card border-1 p-4">
            <h2 class="mb-3">Hello {{ customer.Name }}</h2>
            <p class="fs-5 text-muted">
                Welcome to your customer dashboard.
            </p>
        </div>
        <div class="row mt-4">
            <div class="col-md-6">
                <a href="{% url 'Customer:customerprofile' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-address-card fs-1 mb-3"></i>
                        <h4>Profile</h4>
                    </div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="{% url 'Customer:customerbot' %}" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-center p-4 bg-1 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-robot fs-1 mb-3"></i>
                        <h4>Chatbot</h4>
                    </div>
                </a>
            </div>
        </div>
    </div>
{% endblock %}
