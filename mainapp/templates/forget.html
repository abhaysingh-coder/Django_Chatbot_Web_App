{% extends 'base.html' %}
{% load static %}
{% block content %}
    <div class="text-center">
        <img src="{% static 'bot avatar.png' %}" class="img-fluid h-50 w-25" alt="">
        <h3 class="fw-bold">Reset Password</h3>
        <p class="text-muted mb-0">Reset your password instantly</p>
    </div>
    <form method="post" action="">
        {% csrf_token %}
        <!-- Login As -->
        <div class="mb-3">
            <label class="form-label">Register As</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-users"></i>
                </span>
                <select name="role" class="form-select rounded-end-pill" required>
                    <option value="" selected disabled>Select role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                    <option value="customer">Customer</option>
                </select>
            </div>
        </div>
        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="email" name="email" class="form-control rounded-end-pill" placeholder="Enter email" required>
            </div>
            {% if message %}
            <p class="text-danger small fw-bold">{{message }}</p>
            {% endif %}
        </div>
        <!-- New Password -->
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="password" name="password" class="form-control rounded-0" placeholder="Enter new password"  required>

                <span class="input-group-text rounded-end-pill" onclick="togglePassword()" style="cursor:pointer;">
                    <i id="eye1" class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>
        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="cpassword" class="form-control rounded-0" placeholder="Confirm password" required>
                <span class="input-group-text rounded-end-pill" onclick="toggleCPassword()" style="cursor:pointer;">
                    <i id="eye2" class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>
    
        <!-- Reset Button -->
        <div class="d-grid col-sm-7 mx-auto mb-3">
            <button type="submit" class="btn btn-info fw-bold rounded-pill">
                Reset Password
            </button>
        </div>
        <div class="text-center">
            <a href="{% url 'mainapp:Loginhome' %}" class="text-decoration-none">Back to Login</a>
        </div>
    </form>
{% endblock %}
