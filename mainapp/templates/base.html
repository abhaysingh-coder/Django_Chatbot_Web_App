{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'icon.png' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <div class="container-fluid mx-auto">
        <div class="row mt-2">
            <div class="col-sm-5 card mx-auto mt-4 p-5" style="background-color: rgba(0, 213, 255, 0.2);">
                {% block content %}
                {% endblock %}
            </div>
        </div>
        <footer class="footer position-absolute top-95 end-0">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12 text-end">
                        <p class="mb-0 text-muted">
                            <strong>&copy; Designed and Developed by Abhay Singh</strong>
                        </p>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- JS-->
    <script>
        function togglePassword() {
            const pass = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if (pass.type === "password") {
                pass.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                pass.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
        const pass = document.getElementById("password");
        const cpass = document.getElementById("cpassword");

        function validatePasswords() {
            if (pass.value !== cpass.value) {
                cpass.setCustomValidity("Passwords do not match");
            } else {
                cpass.setCustomValidity("");
            }
        }

        pass.addEventListener("input", validatePasswords);
        cpass.addEventListener("input", validatePasswords);
    </script>
</body>
</html>
