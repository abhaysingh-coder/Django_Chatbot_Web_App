{% load static %}
<!DOCTYPE html>
<html>
    <head>
    <title>Chatbot</title>
        
    <!-- Favicon -->
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- SEO Meta -->
    <meta name="description" content="AI-powered Django Chatbot Web Application for customer support, user interaction, and automated response management with admin dashboard.">
    <meta name="keywords" content="Django Chatbot, AI Chatbot, Python Django Project, Customer Support System, Chatbot Web App, Django AI Project, Bootstrap Chatbot">
    <meta name="author" content="Abhay Singh">

    <!-- Robots -->
    <meta name="robots" content="index, follow">

    <!-- Theme Color -->
    <meta name="theme-color" content="#0d6efd">

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Django Chatbot Web App">
    <meta property="og:description" content="AI-powered chatbot system built using Django, Bootstrap, and Python for customer support automation.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://django-chatbot-web-app.onrender.com/">
    <meta property="og:image" content="https://django-chatbot-web-app.onrender.com/static/bot_avatar.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Django Chatbot Web App">
    <meta name="twitter:description" content="AI-powered chatbot system built using Django and Python.">
    <meta name="twitter:image" content="https://django-chatbot-web-app.onrender.com/static/bot_avatar.png">

</head>
<body>
    <div class="container-fluid mx-auto">
        <div class="row mt-2">
            <div class="col-sm-5 card mx-auto mt-4 p-5" style="background-color: rgba(0, 213, 255, 0.2);">
                {% block content %}
                {% endblock %}
            </div>
        </div>
        <footer class="footer position-absolute top-95 end-0">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12 text-end">
                        <p class="mb-0 text-muted">
                            <strong>&copy; Designed and Developed by Abhay Singh</strong>
                        </p>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- JS-->
    <script>
        function togglePassword() {
            const pass = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if (pass.type === "password") {
                pass.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                pass.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
        const pass = document.getElementById("password");
        const cpass = document.getElementById("cpassword");

        function validatePasswords() {
            if (pass.value !== cpass.value) {
                cpass.setCustomValidity("Passwords do not match");
            } else {
                cpass.setCustomValidity("");
            }
        }

        pass.addEventListener("input", validatePasswords);
        cpass.addEventListener("input", validatePasswords);
    </script>
</body>
</html>
