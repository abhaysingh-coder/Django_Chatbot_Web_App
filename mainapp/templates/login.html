{% extends 'base.html' %}
{% load static %}
{% block content %}
    <div class="text-center">
        <img src="{% static 'bot_avatar.png' %}" alt="" class="img-fluid h-50 w-25">
        <h3 class="fw-bold">Chatbot Login</h3>
        <p class="text-muted mb-0">Sign in to continue</p>
    </div>
    <form method="post" action="">
    {% csrf_token %}
        <!-- User Type -->
        <div class="mb-3">
            <label class="form-label">Login As</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-users"></i>
                </span>
                <select name="role" class="form-select rounded-end-pill" required>
                    <option value="admin">Admin</option>
                    <option value="customer">Customer</option>
                    <option value="user">User</option>
                </select>
            </div>
        </div>
        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group ">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="email" name="email" class="form-control rounded-end-pill" placeholder="Enter email" required>
            </div>
            {% if message %}
            <p class="text-danger small fw-bold">{{message }}</p>
            {% endif %}
        </div>
        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="password" name="password" class="form-control rounded-0" placeholder="Enter password" required>
                <span class="input-group-text rounded-end-pill" style="cursor:pointer;" onclick="togglePassword()">
                    <i id="eyeIcon" class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>
        <!-- Login Button -->
        <div class="d-grid col-sm-7 mx-auto mb-3">
            <button type="submit" class="btn btn-info fw-bold rounded-pill">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Login
            </button>
        </div>
        <!-- Extra Links -->
        <div class="text-center">
            <a href="{% url 'mainapp:forgethome' %}" class="text-decoration-none">Forgot password?</a>
            <span class="mx-2">|</span>
            <a href="{% url 'mainapp:signuphome' %}" class="text-decoration-none">Create account</a>
        </div>
    </form>
    {% endblock %}
