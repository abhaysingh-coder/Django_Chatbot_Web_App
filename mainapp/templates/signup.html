{% extends 'base.html' %}
{% load static %}
{% block content %}
    <div class="text-center">
        <img src="{% static 'bot_avatar.png' %}" alt="" class="img-fluid h-50 w-25">
        <h3 class="fw-bold">Chatbot Signup</h3>
        <p class="text-muted mb-0">Create your account</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <!-- Login As -->
        <div class="mb-3">
            <label class="form-label">Register As</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-users"></i>
                </span>
                <select name="role" class="form-select rounded-end-pill" required>
                    <option value="" selected disabled>Select role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                    <option value="customer">Customer</option>
                </select>
            </div>
        </div>
        
        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" name="username" class="form-control rounded-end-pill" placeholder="Enter username" required>
                    {% if error_message %}
                    <p class="text-danger small fw-bold">{{ error_message }}</p>
                    {% endif %}
            </div>
        </div>

        <div class="row mb-3">
            <!-- First Name -->
             <div class="col-sm-6">
                <label class="form-label">First Name</label>
                <div class="input-group">
                    <span class="input-group-text rounded-start-pill">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="first_name" class="form-control rounded-end-pill" placeholder="Enter first name" required>
                </div>
             </div>
            

            <!-- Last Name -->
             <div class="col-sm-6">
                <label class="form-label">Last Name</label>
                <div class="input-group">
                    <span class="input-group-text rounded-start-pill">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="last_name" class="form-control rounded-end-pill" placeholder="Enter last name" required>
                </div> 
             </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control rounded-end-pill" placeholder="Enter email" required>
            </div>
        </div>

        <!-- Phone Number -->
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-phone"></i>
                </span>
                <input type="text" name="phone_number" class="form-control rounded-end-pill" placeholder="Enter phone number" maxlength="10" required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" name="password" class="form-control rounded-end-pill" placeholder="Enter password" required>
            </div>
        </div>


        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text rounded-start-pill">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="cpassword" name="confirm_password" class="form-control rounded-0" placeholder="Confirm password" required>
                <span class="input-group-text rounded-end-pill" style="cursor:pointer;" onclick="toggleConfirmPassword()">
                    <i id="eyeIcon2" class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>

        <!-- Signup Button -->
        <div class="d-grid col-sm-7 mx-auto mb-3">
            <button type="submit" class="btn btn-info fw-bold rounded-pill">
                <i class="fa-solid fa-user-plus me-2"></i> Signup
            </button>
        </div>

        <!-- Extra Links -->
        <div class="text-center">
            <a href="{% url 'mainapp:Loginhome' %}" class="text-decoration-none">
                Already have an account? Login
            </a>
        </div>
    </form>
{% endblock %}
